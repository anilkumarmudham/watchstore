
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Store</title>
  <link rel="stylesheet" href="style5.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1 class="logo"><a href="index5.html">AKM digitals<span>.</span></a></h1>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Watches</a></li>
        <li><a href="#">Collections</a></li>
        <li><a href="#">Contact us</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Slider -->
  <section class="hero">
    <div class="swiper hero-slider">
      <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="daniel-hay-O703kpzIsQI-unsplash.jpg" alt="Watch 1"></div>
        <div class="swiper-slide"><img src="frank-park-nXruwpNrOzQ-unsplash.jpg" alt="Watch 2"></div>
        <div class="swiper-slide"><img src="john-torcasio-TJrkkhdB39E-unsplash.jpg" alt="Watch 3"></div>
      </div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </section>

  <!-- Products -->
  <section class="products">
    <h2>Featured Watches</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="frank-park-nXruwpNrOzQ-unsplash.jpg" alt="Watch 1">
        <h3>Classic Leather Watch</h3>
        <p>$199.00</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="shreesha-bhat-lz6z9GZu8hk-unsplash.jpg" alt="Watch 2">
        <h3>Silver Mesh Watch</h3>
        <p>$249.00</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="daniel-hay-O703kpzIsQI-unsplash.jpg" alt="Watch 3">
        <h3>Chronograph Black</h3>
        <p>$299.00</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 Akm Watch Store. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
